name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check forbidden files, sizes and secret signatures
        run: python tools/check_repository_hygiene.py

  python:
    name: Python tests and contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema

      - name: Compile Python sources
        run: python -m compileall -q src tests apps shared tools

      - name: Run pytest
        run: python -m pytest -q

      - name: Validate shared contract examples
        run: python shared/schemas/validate_examples.py

  cpp-qsh-m10x-regression:
    name: C++ QSH M10X regression (20 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install C++ build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            zlib1g-dev

      - name: Configure qsh_ingest
        run: cmake -S cpp/qsh_ingest -B build/qsh_ingest -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build qsh_ingest and tests
        run: cmake --build build/qsh_ingest --parallel 2

      - name: Verify expected regression test inventory
        run: |
          count="$(ctest --test-dir build/qsh_ingest -N | sed -n 's/^Total Tests: //p')"
          echo "CTest inventory: ${count}"
          test "${count}" = "20"

      - name: Run all QSH M10X regression tests
        run: ctest --test-dir build/qsh_ingest --output-on-failure
