name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_python: ${{ steps.route.outputs.run_python }}
      run_fast: ${{ steps.route.outputs.run_fast }}
      run_raw: ${{ steps.route.outputs.run_raw }}
      full_matrix: ${{ steps.route.outputs.full_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Compute changed paths
        if: github.event_name == 'pull_request'
        run: |
          : > "$RUNNER_TEMP/changed_paths.txt"
          git diff --name-only --no-renames \
            '${{ github.event.pull_request.base.sha }}' \
            '${{ github.event.pull_request.head.sha }}' \
            > "$RUNNER_TEMP/changed_paths.txt" || {
            echo "::warning::git diff failed; routing to full matrix"
            : > "$RUNNER_TEMP/changed_paths.txt"
          }

      - name: Route CI jobs
        id: route
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python tools/ci_route.py \
              --paths-file "$RUNNER_TEMP/changed_paths.txt" \
              --github-output "$GITHUB_OUTPUT"
          else
            python tools/ci_route.py \
              --paths-file /dev/null \
              --force-full \
              --github-output "$GITHUB_OUTPUT"
          fi

      - name: Validate canonical label configuration
        run: python -m json.tool .github/task-labels.json > /dev/null

      - name: Check forbidden files, sizes and secret signatures
        run: python tools/check_repository_hygiene.py

  python:
    name: Python tests and contracts
    needs: repository-hygiene
    if: needs.repository-hygiene.outputs.run_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest jsonschema

      - name: Compile maintained Python modules
        run: python -m compileall -q src tests shared tools

      - name: Run pytest
        run: python -m pytest -q

      - name: Validate shared contract examples
        run: python shared/schemas/validate_examples.py

  # RT-1 inspector: 6 tests on Windows/MSVC, RT-3 decoder: 9 tests, RT-4 A1: 1, RT-4 A2: 1, Gate A: 1
  cpp-moex-fast-inspector:
    name: "C++ MOEX FAST Windows/MSVC (RT-1: 6, RT-3: 9)"
    needs: repository-hygiene
    if: needs.repository-hygiene.outputs.run_fast == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure moex_fast with MSVC
        run: cmake -S cpp/moex_fast -B build/moex_fast -A x64

      - name: Build moex_fast and tests
        run: cmake --build build/moex_fast --config Release --parallel 2

      - name: Verify exact RT-1 inspector test inventory (6 tests)
        run: |
          $expected = @(
            'test_template_parser',
            'test_config_parser',
            'test_provenance',
            'test_deterministic_report',
            'test_resource_safety',
            'test_cli'
          )
          $output = ctest --test-dir build/moex_fast -C Release -N
          $names = ($output | Select-String '^\s*Test\s+#\d+:\s+(.+?)\s*$').ForEach({ $_.Matches.Groups[1].Value })
          foreach ($name in $expected) {
            if ($name -notin $names) {
              throw "RT-1 test '$name' not found in CTest inventory"
            }
          }
          Write-Host "RT-1 inventory verified: $($expected.Count) tests present"

      - name: Verify exact RT-3 decoder test inventory (9 tests)
        run: |
          $expected = @(
            'test_decoder_primitives',
            'test_decoder_compiler',
            'test_decoder_session',
            'test_decoder_operators',
            'test_decoder_sequences',
            'test_decoder_rollback',
            'test_decoder_cli',
            'test_decoder_limits',
            'test_decoder_reference_oracle'
          )
          $output = ctest --test-dir build/moex_fast -C Release -N
          $names = ($output | Select-String '^\s*Test\s+#\d+:\s+(.+?)\s*$').ForEach({ $_.Matches.Groups[1].Value })
          foreach ($name in $expected) {
            if ($name -notin $names) {
              throw "RT-3 test '$name' not found in CTest inventory"
            }
          }
          Write-Host "RT-3 inventory verified: $($expected.Count) tests present"

      - name: Verify exact RT-4 A1 framing test inventory (1 test)
        run: |
          $expected = @(
            'test_spectra_udp_framing'
          )
          $output = ctest --test-dir build/moex_fast -C Release -N
          $names = ($output | Select-String '^\s*Test\s+#\d+:\s+(.+?)\s*$').ForEach({ $_.Matches.Groups[1].Value })
          foreach ($name in $expected) {
            if ($name -notin $names) {
              throw "RT-4 A1 test '$name' not found in CTest inventory"
            }
          }
          Write-Host "RT-4 A1 inventory verified: $($expected.Count) tests present"

      - name: Verify exact RT-4 A2 sequence arithmetic test inventory (1 test)
        run: |
          $expected = @(
            'test_spectra_sequence_arithmetic'
          )
          $output = ctest --test-dir build/moex_fast -C Release -N
          $names = ($output | Select-String '^\s*Test\s+#\d+:\s+(.+?)\s*$').ForEach({ $_.Matches.Groups[1].Value })
          foreach ($name in $expected) {
            if ($name -notin $names) {
              throw "RT-4 A2 test '$name' not found in CTest inventory"
            }
          }
          Write-Host "RT-4 A2 inventory verified: $($expected.Count) tests present"

      - name: Verify exact RT-4 Gate A test inventory (1 test)
        run: |
          $expected = @(
            'test_spectra_gate_a'
          )
          $output = ctest --test-dir build/moex_fast -C Release -N
          $names = ($output | Select-String '^\s*Test\s+#\d+:\s+(.+?)\s*$').ForEach({ $_.Matches.Groups[1].Value })
          foreach ($name in $expected) {
            if ($name -notin $names) {
              throw "RT-4 Gate A test '$name' not found in CTest inventory"
            }
          }
          Write-Host "RT-4 Gate A inventory verified: $($expected.Count) tests present"

      - name: Verify total test count (18)
        run: |
          $output = ctest --test-dir build/moex_fast -C Release -N
          $line = $output | Select-String '^Total Tests:'
          $count = [int](($line.Line -split ':', 2)[1].Trim())
          Write-Host "CTest inventory: $count (expected 18: 6 RT-1 + 9 RT-3 + 1 RT-4 A1 + 1 RT-4 A2 + 1 Gate A)"
          if ($count -ne 18) {
            throw "Expected 18 moex_fast tests (6 RT-1 + 9 RT-3 + 1 RT-4 A1 + 1 RT-4 A2 + 1 Gate A), found $count"
          }

      - name: Run all moex_fast tests (RT-1 + RT-3)
        run: ctest --test-dir build/moex_fast -C Release --output-on-failure

      - name: Run Gate A benchmark (zero-allocation evidence)
        run: build\moex_fast\Release\bench_spectra_gate_a.exe

  # RT-1 inspector: 6 tests on Linux/GCC, RT-3 decoder: 9 tests, RT-4 A1: 1, RT-4 A2: 1, Gate A: 1
  cpp-moex-fast-inspector-linux:
    name: "C++ MOEX FAST Linux/GCC (RT-1: 6, RT-3: 9)"
    needs: repository-hygiene
    if: needs.repository-hygiene.outputs.run_fast == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure moex_fast with GCC
        run: cmake -S cpp/moex_fast -B build/moex_fast -DCMAKE_BUILD_TYPE=Release

      - name: Build moex_fast and tests
        run: cmake --build build/moex_fast --config Release --parallel 2

      - name: Verify exact RT-1 inspector test inventory (6 tests)
        run: |
          for name in test_template_parser test_config_parser test_provenance test_deterministic_report test_resource_safety test_cli; do
            if ! ctest --test-dir build/moex_fast -C Release -N 2>&1 | grep -q "$name"; then
              echo "RT-1 test '$name' not found in CTest inventory"
              exit 1
            fi
          done
          echo "RT-1 inventory verified: 6 tests present"

      - name: Verify exact RT-3 decoder test inventory (9 tests)
        run: |
          for name in test_decoder_primitives test_decoder_compiler test_decoder_session test_decoder_operators test_decoder_sequences test_decoder_rollback test_decoder_cli test_decoder_limits test_decoder_reference_oracle; do
            if ! ctest --test-dir build/moex_fast -C Release -N 2>&1 | grep -q "$name"; then
              echo "RT-3 test '$name' not found in CTest inventory"
              exit 1
            fi
          done
          echo "RT-3 inventory verified: 9 tests present"

      - name: Verify exact RT-4 A1 framing test inventory (1 test)
        run: |
          for name in test_spectra_udp_framing; do
            if ! ctest --test-dir build/moex_fast -C Release -N 2>&1 | grep -q "$name"; then
              echo "RT-4 A1 test '$name' not found in CTest inventory"
              exit 1
            fi
          done
          echo "RT-4 A1 inventory verified: 1 test present"

      - name: Verify exact RT-4 A2 sequence arithmetic test inventory (1 test)
        run: |
          for name in test_spectra_sequence_arithmetic; do
            if ! ctest --test-dir build/moex_fast -C Release -N 2>&1 | grep -q "$name"; then
              echo "RT-4 A2 test '$name' not found in CTest inventory"
              exit 1
            fi
          done
          echo "RT-4 A2 inventory verified: 1 test present"

      - name: Verify exact RT-4 Gate A test inventory (1 test)
        run: |
          for name in test_spectra_gate_a; do
            if ! ctest --test-dir build/moex_fast -C Release -N 2>&1 | grep -q "$name"; then
              echo "RT-4 Gate A test '$name' not found in CTest inventory"
              exit 1
            fi
          done
          echo "RT-4 Gate A inventory verified: 1 test present"

      - name: Verify total test count (18)
        run: |
          count=$(ctest --test-dir build/moex_fast -C Release -N 2>&1 | grep -oP 'Total Tests: \K\d+')
          echo "CTest inventory: $count (expected 18: 6 RT-1 + 9 RT-3 + 1 RT-4 A1 + 1 RT-4 A2 + 1 Gate A)"
          if [ "$count" -ne 18 ]; then
            echo "Expected 18 moex_fast tests (6 RT-1 + 9 RT-3 + 1 RT-4 A1 + 1 RT-4 A2 + 1 Gate A), found $count"
            exit 1
          fi

      - name: Run all moex_fast tests (RT-1 + RT-3)
        run: ctest --test-dir build/moex_fast -C Release --output-on-failure

      - name: Run Gate A benchmark (zero-allocation evidence)
        run: ./build/moex_fast/bench_spectra_gate_a

  cpp-moex-raw-windows:
    name: C++ MOEX RAW Windows/MSVC (18 tests)
    needs: repository-hygiene
    if: needs.repository-hygiene.outputs.run_raw == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure moex_raw with MSVC
        run: cmake -S cpp/moex_raw -B build/moex_raw -A x64

      - name: Build moex_raw and tests
        run: cmake --build build/moex_raw --config Release --parallel 2

      - name: Verify expected test inventory
        run: |
          $output = ctest --test-dir build/moex_raw -C Release -N
          if ($LASTEXITCODE -ne 0) {
            throw "ctest inventory failed with exit code $LASTEXITCODE"
          }
          $line = $output | Select-String '^Total Tests:'
          if (-not $line) {
            throw 'CTest did not report Total Tests.'
          }
          $count = [int](($line.Line -split ':', 2)[1].Trim())
          Write-Host "CTest inventory: $count"
          if ($count -ne 18) {
            throw "Expected 18 RT-2 tests, found $count"
          }

      - name: Run all RT-2 tests
        run: ctest --test-dir build/moex_raw -C Release --output-on-failure

  cpp-moex-raw-linux:
    name: C++ MOEX RAW Linux/GCC (18 tests)
    needs: repository-hygiene
    if: needs.repository-hygiene.outputs.run_raw == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure moex_raw with GCC
        run: cmake -S cpp/moex_raw -B build/moex_raw -DCMAKE_BUILD_TYPE=Release

      - name: Build moex_raw and tests
        run: cmake --build build/moex_raw --config Release --parallel 2

      - name: Verify expected test inventory
        run: |
          count=$(ctest --test-dir build/moex_raw -C Release -N 2>&1 | grep -oP 'Total Tests: \K\d+')
          echo "CTest inventory: $count"
          if [ "$count" -ne 18 ]; then
            echo "Expected 18 RT-2 tests, found $count"
            exit 1
          fi

      - name: Run all RT-2 tests
        run: ctest --test-dir build/moex_raw -C Release --output-on-failure
